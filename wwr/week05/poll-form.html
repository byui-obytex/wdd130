<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll-Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
    <header>
        <h1>WDD 130| HTML Form-user poll</h1>
    </header>
    <main>
        <form>
            <div class="form-item column2">
            <label for="fullname">fullname</label>
            <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item column2">
            <label for="email">Email</label>
            <input type="email" id="usermail" name="usermail" required>
            </div>
            <div class="form-item column1">
            <label for="quantity">select quantity</label>
            <select name="quantity" id="quantity">
                <option value="1">one</option>
                <option value="2">two</option>
                <option value="3">three</option>
            </select>
            </div>
            <label for="browser">what is your favorite internet browser?</label>
            <select id="browser" name="browser">
                <option value="firefox">firefox</option>
                <option value="chrome">chrome</option>
                <option value="safari">safari</option>
                <option value="edge">Edge</option>
                <option value="brave">brave</option>
                <option value="other">other</option>
            </select>
            <div class="column1">
            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet">
            </div>
            <label for="feedback">List the place you have lived:</label>
            <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater florida,Amsterdam,Nertherlands,Timbukfu mali"></textarea>
        </form>
    </main>
    <footer>
       <button type="submit">Submit poll:</button> 
    </footer>
    
</body>
</html>
