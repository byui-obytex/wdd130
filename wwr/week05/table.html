<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table HTML</title>
    <link rel="stylesheet" href="styles/table.css">
</head>
<body>
    <table>
        <thead>
        <tr>
            <th>League</th>
            <th>Team</th>
            <th>Record</th>
            <th>Player Count</th>
        </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Southern</td>
                <td>parana</td>
                <td>52-19</td>
                <td>23</td>
            </tr>
            <tr>
                <td>catarina</td>
                <td>49-24</td>
                <td>10</td>
            </tr>
            <tr>
                <td rowspan="3">Western</td>
                <td>Lecerda</td>
                <td>92-70</td>
                <td>27</td>
            </tr>
            <tr>
                <td>Acre</td>
                <td>75-87</td>
                <td>20</td>
            </tr>
            <tr>
                <td>Rondonia</td>
                <td>10-17</td>
                <td>12</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Total Players</th>
                <td>92</td>
            </tr>
        </tfoot>
        </table>
    </table>
    
</body>
</html>
